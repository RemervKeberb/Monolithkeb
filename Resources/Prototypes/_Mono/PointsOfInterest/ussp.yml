- type: pointOfInterest
  id: USSPCamelot
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Freeport Camelot'
  minimumDistance: 10650
  maximumDistance: 12400
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueUSSP, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_Mono/POI/camelot.yml
  addComponents:
  - type: IFF
    color: "#ccaa55"

- type: gameMap
  id: USSPCamelot
  mapName: 'Freeport Camelot'
  mapPath: /Maps/_Mono/POI/camelot.yml
  minPlayers: 0
  stations:
    USSPCamelot:
      stationProto: RecordsFrontierOutpostCargo
      gridComponents:
        - type: VesselMusic
          ambientMusicPrototype: CamelotMusic
        - type: VesselInfo
          description: "A rickety old station that has been cobbled together over many many cycles..."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Freeport Camelot'
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Storage/Crates/secure_ammo.rsi
            state: icon
          stationSubtext: 'frontier-lobby-camelot-subtext'
          stationDescription: 'frontier-lobby-camelot-description'
          lobbySortOrder: 4
        - type: StationJobs
          availableJobs:
            USSPCommissar: [1, 1]
            USSPSergeant: [4, 4]
            USSPRifleman: [-1, -1]
            VGCommander: [1, 1]
            VGLieutenant: [2, 2]
            VGInfanteer: [-1, -1]
            Contractor: [-1, -1]
            Pilot: [0, -1]
            Mercenary: [0, -1]
          tags:
          - USSPCommand
        - type: StationDeadDrop
          maxDeadDrops: 2 # Fewer here, players start here.
